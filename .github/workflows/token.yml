name: Get OIDC Token

on:
  push:

jobs:
  get-oidc-token:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Request OIDC token and save to file
        run: |
          echo "Requesting OIDC token..."

          # Audience must match your Workload Identity Pool provider
          AUDIENCE="//iam.googleapis.com/projects/930462039130/locations/global/workloadIdentityPools/research-pool/providers/github-provider"

          # Request the OIDC token
          RESPONSE=$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE")

          # Save the token JSON
          echo "$RESPONSE" > token.json
          echo "OIDC token saved to token.json"

      - name: Upload OIDC token as artifact
        uses: actions/upload-artifact@v4
        with:
          name: oidc-token
          path: token.json
