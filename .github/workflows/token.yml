- name: Exchange OIDC token for federated token
  run: |
    AUDIENCE="//iam.googleapis.com/projects/930462039130/locations/global/workloadIdentityPools/research-pool/providers/github-provider"

    OIDC_TOKEN=$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
      "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$AUDIENCE" | jq -r .value)

    echo "Exchanging OIDC token for federated token..."

    FEDERATED_TOKEN=$(curl -s -X POST https://sts.googleapis.com/v1/token \
      -H "Content-Type: application/x-www-form-urlencoded" \
      -d "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
      -d "audience=$AUDIENCE" \
      -d "scope=https://www.googleapis.com/auth/cloud-platform" \
      -d "requested_token_type=urn:ietf:params:oauth:token-type:access_token" \
      -d "subject_token=$OIDC_TOKEN" \
      -d "subject_token_type=urn:ietf:params:oauth:token-type:jwt" | jq -r .access_token)

    echo "Federated token: $FEDERATED_TOKEN"
